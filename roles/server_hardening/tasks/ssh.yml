---
- name: SSH | Ensure openssh-server is installed
  ansible.builtin.apt:
    name: openssh-server
    state: present

- name: SSH | Ensure privilege separation directory exists
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: SSH | Deploy hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: "sshd -t -f %s"
    backup: true
  notify: Restart sshd

- name: SSH | Ensure sshd is enabled and running
  ansible.builtin.systemd:
    name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
    enabled: true
    state: started
